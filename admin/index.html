<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2 Stock CMS</title>
    <!-- CMS স্ক্রিপ্ট -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </head>
  <body>
    <script>
      // গিটহাব অথেন্টিকেশনের জন্য কনফিগারেশন
      window.CMS_CONFIG = {
        backend: {
          name: "github",
          repo: "2stock-lab/2-stock",
          branch: "main"
        },
        collections: [
          {
            name: "blog",
            label: "Blog",
            folder: "content/blog",
            create: true,
            fields: [
              { label: "Title", name: "title", widget: "string" },
              { label: "Body", name: "body", widget: "markdown" }
            ]
          }
        ]
      };
      CMS.init({ config: window.CMS_CONFIG });
    </script>
  </body>
</html>
