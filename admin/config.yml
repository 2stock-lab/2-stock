backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "assets"
    label: "Assets"
    folder: "content"
    create: true
    fields:
      - { name: "title", widget: "string" }
      - { name: "image", widget: "image" }
      - { name: "price", widget: "string" }
