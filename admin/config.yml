backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "assets"
    label: "Assets"
    folder: "assets"
    create: true

    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Price", name: "price", widget: "string" }
      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - "photo"
          - "vector"
          - "video"
      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - "new"
          - "popular"
