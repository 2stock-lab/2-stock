<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2 Stock</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body{
background:#05070f;
color:white;
overflow-x:hidden;
}

/* --- Apple Liquid Glass ব্যাকগ্রাউন্ড --- */
.bg{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
background: 
    radial-gradient(circle at 10% 20%, rgba(0, 229, 255, 0.25), transparent 40%),
    radial-gradient(circle at 90% 10%, rgba(255, 0, 128, 0.2), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(139, 92, 246, 0.25), transparent 50%),
    #070b19;
background-size: cover;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
backdrop-filter: blur(30px) saturate(180%);
-webkit-backdrop-filter: blur(30px) saturate(180%);
background: rgba(255, 255, 255, 0.03);
border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}

.logo-container {
display: flex;
align-items: center;
}

.site-logo {
height: 50px;
width: auto;
object-fit: contain;
}

.hero{
height:85vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.glass{
background: rgba(255, 255, 255, 0.03);
border: 1px solid rgba(255, 255, 255, 0.1);
backdrop-filter: blur(25px) saturate(160%);
-webkit-backdrop-filter: blur(25px) saturate(160%);
padding: 50px;
border-radius: 30px;
max-width: 800px;
box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
}

h1{
font-size:60px;
margin-bottom:10px;
background: linear-gradient(135deg, #ffffff 0%, #a5f3fc 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}

.btn{
display:inline-block;
margin-top:20px;
padding:14px 35px;
border-radius:50px;
text-decoration:none;
color:white;
font-weight: bold;
background: linear-gradient(90deg, rgba(0,229,255,0.8), rgba(139,92,246,0.8));
backdrop-filter: blur(10px);
border: 1px solid rgba(255,255,255,0.2);
box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
transition: all 0.3s ease;
}

.btn:hover {
transform: translateY(-3px);
box-shadow: 0 8px 25px rgba(0, 229, 255, 0.5);
background: linear-gradient(90deg, rgba(0,229,255,1), rgba(139,92,246,1));
}

/* --- ফিল্টার কন্টেইনার --- */
.filter-wrapper {
display: flex;
flex-direction: column;
align-items: center;
gap: 15px;
margin-bottom: 40px;
}

.main-filter, .sub-filter {
display: flex;
justify-content: center;
gap: 12px;
}

.sub-filter {
display: none;
animation: fadeIn 0.4s ease forwards;
}

.sub-filter.show {
display: flex;
}

.filter-btn {
background: rgba(255, 255, 255, 0.03);
color: rgba(255, 255, 255, 0.7);
border: 1px solid rgba(255, 255, 255, 0.08);
padding: 10px 24px;
font-size: 14px;
font-weight: bold;
border-radius: 30px;
cursor: pointer;
backdrop-filter: blur(15px);
-webkit-backdrop-filter: blur(15px);
transition: all 0.3s ease;
}

.filter-btn:hover, .filter-btn.active {
background: linear-gradient(90deg, rgba(0, 229, 255, 0.8), rgba(139, 92, 246, 0.8));
color: white;
border-color: transparent;
box-shadow: 0 6px 15px rgba(0, 229, 255, 0.25);
}

.sub-btn {
padding: 8px 20px;
font-size: 13px;
background: rgba(255, 255, 255, 0.01);
border: 1px solid rgba(255, 255, 255, 0.05);
}

.sub-btn:hover, .sub-btn.active {
background: linear-gradient(90deg, rgba(139, 92, 246, 0.7), rgba(255, 0, 128, 0.7));
box-shadow: 0 6px 15px rgba(139, 92, 246, 0.25);
}

.gallery{
padding:60px 8%;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

/* --- Apple Liquid Glass কার্ড স্টাইল --- */
.card {
height: 260px;
background: rgba(255, 255, 255, 0.02);
border: 1px solid rgba(255, 255, 255, 0.08);
backdrop-filter: blur(20px) saturate(140%);
-webkit-backdrop-filter: blur(20px) saturate(140%);
border-radius: 24px;
overflow: hidden;
cursor: pointer;
box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), 
            box-shadow 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), 
            border-color 0.4s ease, opacity 0.3s ease;
}

.card.hide {
display: none;
}

.card:hover {
transform: translateY(-10px) scale(1.02);
box-shadow: 0 20px 40px rgba(0, 229, 255, 0.15), 
            0 0 25px rgba(139, 92, 246, 0.1);
border-color: rgba(255, 255, 255, 0.25);
}

.card img {
width: 100%;
height: 100%;
object-fit: cover;
display: block;
transition: transform 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
}

.card:hover img {
transform: scale(1.06);
}

/* --- ইমেজ পপআপ (Lightbox) স্টাইল --- */
.popup-overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-color: rgba(3, 5, 15, 0.85);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
display: flex;
justify-content: center;
align-items: center;
opacity: 0;
pointer-events: none;
transition: opacity 0.3s ease;
z-index: 1000;
}
.popup-overlay.active {
opacity: 1;
pointer-events: auto;
}
.popup-img {
max-width: 90%;
max-height: 80%;
border-radius: 20px;
border: 1px solid rgba(255, 255, 255, 0.15);
box-shadow: 0 0 50px rgba(0, 229, 255, 0.2);
transform: scale(0.85);
transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.popup-overlay.active .popup-img {
transform: scale(1);
}
.close-btn {
position: absolute;
top: 20px;
right: 30px;
font-size: 45px;
color: rgba(255, 255, 255, 0.6);
cursor: pointer;
transition: color 0.2s, transform 0.2s;
}
.close-btn:hover {
color: #00e5ff;
transform: scale(1.1);
}

footer{
text-align:center;
padding:40px;
color: rgba(255, 255, 255, 0.4);
font-size: 14px;
border-top: 1px solid rgba(255, 255, 255, 0.05);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="bg"></div>

<nav>
<div class="logo-container">
    <img src="logo.png" alt="2 Stock Logo" class="site-logo">
</div>
</nav>

<section class="hero">
<div class="glass">
<h1>2 Stock</h1>
<p style="color: #94a3b8; font-size: 18px; letter-spacing: 0.5px;">Premium AI Photos & Artworks</p>
<a href="#gallery-section" class="btn">Explore Gallery</a>
</div>
</section>

<section class="gallery" id="gallery-section">
<h2 style="text-align:center; margin-bottom:30px; font-size: 28px; background: linear-gradient(90deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Featured Collection</h2>

<div class="filter-wrapper">
    <div class="main-filter">
        <button class="filter-btn active" data-main="all">All</button>
        <button class="filter-btn" data-main="photo">Photos</button>
        <button class="filter-btn" data-main="vector">Vectors</button>
    </div>
    
    <div class="sub-filter" id="subFilterContainer">
        <button class="filter-btn sub-btn active" data-sub="all">All</button>
        <button class="filter-btn sub-btn" data-sub="new">New</button>
        <button class="filter-btn sub-btn" data-sub="popular">Popular</button>
    </div>
</div>

<div class="grid">
    <div class="card" data-type="photo" data-status="new"><img src="photo1.png" alt="AI Artwork"></div>
    <div class="card" data-type="photo" data-status="new"><img src="photo2.jpg" alt="AI Artwork"></div>
    <div class="card" data-type="photo" data-status="popular"><img src="photo3.jpg" alt="AI Artwork"></div>
    <div class="card" data-type="photo" data-status="new"><img src="photo4.jpeg" alt="AI Artwork"></div>
    <div class="card" data-type="photo" data-status="popular"><img src="photo5.jpg" alt="AI Artwork"></div>
    <div class="card" data-type="photo" data-status="new"><img src="photo6.jpg" alt="AI Artwork"></div>
    <div class="card" data-type="photo" data-status="popular"><img src="photo7.jpg" alt="AI Artwork"></div>
    <div class="card" data-type="photo" data-status="popular"><img src="photo8.jpg" alt="AI Artwork"></div>
    <div class="card" data-type="photo" data-status="new"><img src="photo9.jpg" alt="AI Artwork"></div>
    
    <div class="card" data-type="vector" data-status="popular"><img src="photo10.jpg" alt="AI Vector Artwork"></div>
</div>

</section>

<div class="popup-overlay" id="popupOverlay">
<span class="close-btn" id="closeBtn">&times;</span>
<img class="popup-img" id="popupImg" src="" alt="Popup View">
</div>

<footer>
© 2026 2 Stock • Designed with Liquid Glass Effect
</footer>

<script>
// --- ইমেজ পপআপ ---
const cards = document.querySelectorAll('.card img');
const overlay = document.getElementById('popupOverlay');
const popupImg = document.getElementById('popupImg');
const closeBtn = document.getElementById('closeBtn');

cards.forEach(img => {
    img.addEventListener('click', () => {
        popupImg.src = img.src;
        overlay.classList.add('active');
    });
});

closeBtn.addEventListener('click', () => {
    overlay.classList.remove('active');
});

overlay.addEventListener('click', (e) => {
    if (e.target === overlay) {
        overlay.classList.remove('active');
    }
});

// --- ডাবল লেয়ার ফিল্টার লজিক ---
const mainButtons = document.querySelectorAll('.main-filter .filter-btn');
const subButtons = document.querySelectorAll('.sub-filter .sub-btn');
const subFilterContainer = document.getElementById('subFilterContainer');
const filterableCards = document.querySelectorAll('.grid .card');

let currentMainFilter = 'all';
let currentSubFilter = 'all';

mainButtons.forEach(button => {
    button.addEventListener('click', () => {
        document.querySelector('.main-filter .filter-btn.active').classList.remove('active');
        button.classList.add('active');

        currentMainFilter = button.getAttribute('data-main');
        
        // সাব-ফিল্টার বাটন রিসেট টু 'All'
        document.querySelector('.sub-filter .sub-btn.active').classList.remove('active');
        subButtons[0].classList.add('active');
        currentSubFilter = 'all';

        if (currentMainFilter === 'all') {
            subFilterContainer.classList.remove('show');
        } else {
            subFilterContainer.classList.add('show');
        }

        applyFilters();
    });
});

subButtons.forEach(button => {
    button.addEventListener('click', () => {
        document.querySelector('.sub-filter .sub-btn.active').classList.remove('active');
        button.classList.add('active');

        currentSubFilter = button.getAttribute('data-sub');
        applyFilters();
    });
});

// মেইন এবং সাব ফিল্টার একুরেটলি কাজ করানোর মূল ফাংশন
function applyFilters() {
    filterableCards.forEach(card => {
        let cardType = card.getAttribute('data-type');
        let cardStatus = card.getAttribute('data-status');

        let matchMain = (currentMainFilter === 'all' || currentMainFilter === cardType);
        let matchSub = (currentSubFilter === 'all' || currentSubFilter === cardStatus);

        if (matchMain && matchSub) {
            card.classList.remove('hide');
        } else {
            card.classList.add('hide');
        }
    });
}
</script>

</body>
</html>
