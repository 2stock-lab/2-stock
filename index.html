<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2 Stock</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

.bg{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
background:
radial-gradient(circle at 20% 20%, rgba(0,255,255,.15), transparent 30%),
radial-gradient(circle at 80% 80%, rgba(140,0,255,.15), transparent 30%);
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
backdrop-filter:blur(20px);
background:rgba(255,255,255,.05);
border-bottom:1px solid rgba(255,255,255,.1);
}

.logo-container {
display: flex;
align-items: center;
}

.site-logo {
height: 50px;
width: auto;
object-fit: contain;
}

.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.glass{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.12);
backdrop-filter:blur(20px);
padding:50px;
border-radius:25px;
max-width:800px;
}

h1{
font-size:60px;
margin-bottom:10px;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 30px;
border-radius:50px;
text-decoration:none;
color:white;
background:linear-gradient(90deg,#00e5ff,#8b5cf6);
}

/* --- ক্যাটাগরি ফিল্টার বাটন স্টাইল --- */
.filter-container {
display: flex;
justify-content: center;
gap: 15px;
margin-bottom: 40px;
}

.filter-btn {
background: rgba(255, 255, 255, 0.05);
color: white;
border: 1px solid rgba(255, 255, 255, 0.1);
padding: 10px 24px;
font-size: 16px;
font-weight: bold;
border-radius: 30px;
cursor: pointer;
backdrop-filter: blur(10px);
transition: all 0.3s ease;
}

/* মাউস নিলে বা বাটন একটিভ থাকলে যে কালার হবে */
.filter-btn:hover, .filter-btn.active {
background: linear-gradient(90deg, #00e5ff, #8b5cf6);
border-color: transparent;
box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
}

.gallery{
padding:80px 8%;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* --- ইমেজ কার্ড এবং হোভার ইফেক্ট --- */
.card {
height: 250px;
background: rgba(255,255,255,.05);
border: 1px solid rgba(255,255,255,.1);
backdrop-filter: blur(15px);
border-radius: 20px;
overflow: hidden;
cursor: pointer;
transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.3s ease;
}

/* ফিল্টার করার সময় হাইড হওয়া ছবির অ্যানিমেশন */
.card.hide {
display: none;
}

.card:hover {
transform: translateY(-8px);
box-shadow: 0 10px 20px rgba(0, 229, 255, 0.2);
border-color: rgba(0, 229, 255, 0.4);
}

.card img {
width: 100%;
height: 100%;
object-fit: cover;
display: block;
transition: transform 0.3s ease;
}

.card:hover img {
transform: scale(1.05);
}

/* --- ইমেজ পপআপ (Lightbox) স্টাইল --- */
.popup-overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-color: rgba(0, 0, 0, 0.9);
display: flex;
justify-content: center;
align-items: center;
opacity: 0;
pointer-events: none;
transition: opacity 0.3s ease;
z-index: 1000;
}
.popup-overlay.active {
opacity: 1;
pointer-events: auto;
}
.popup-img {
max-width: 90%;
max-height: 80%;
border-radius: 12px;
box-shadow: 0 0 25px rgba(0, 229, 255, 0.3);
transform: scale(0.8);
transition: transform 0.3s ease;
}
.popup-overlay.active .popup-img {
transform: scale(1);
}
.close-btn {
position: absolute;
top: 20px;
right: 30px;
font-size: 45px;
color: #fff;
cursor: pointer;
transition: color 0.2s;
}
.close-btn:hover {
color: #00e5ff;
}

footer{
text-align:center;
padding:30px;
border-top:1px solid rgba(255,255,255,.1);
}
</style>
</head>

<body>

<div class="bg"></div>

<nav>
<div class="logo-container">
    <img src="logo.png" alt="2 Stock Logo" class="site-logo">
</div>
</nav>

<section class="hero">
<div class="glass">
<h1>2 Stock</h1>
<p>Premium AI Photos & Vectors</p>
<a href="#gallery-section" class="btn">Explore</a> <!-- এখানে ক্লিক করলে গ্যালারিতে স্ক্রল হবে -->
</div>
</section>

<!-- আইডি যোগ করা হলো যাতে এক্সপ্লোর বাটনে ক্লিক করলে এখানে আসে -->
<section class="gallery" id="gallery-section">
<h2 style="text-align:center;margin-bottom:30px;">Featured Collection</h2>

<!-- ক্যাটাগরি ফিল্টার বাটনসমূহ -->
<div class="filter-container">
    <button class="filter-btn active" data-name="all">All</button>
    <button class="filter-btn" data-name="photo">Photos</button>
    <button class="filter-btn" data-name="vector">Vectors</button>
</div>

<!-- গ্যালারি এবং প্রতিটি কার্ডে ক্যাটাগরি সেট (data-category) -->
<div class="grid">
    <div class="card" data-category="photo"><img src="photo1.png" alt="AI Portfolio"></div>
    <div class="card" data-category="photo"><img src="photo2.jpg" alt="AI Portfolio"></div>
    <div class="card" data-category="photo"><img src="photo3.jpg" alt="AI Portfolio"></div>
    <div class="card" data-category="vector"><img src="photo4.jpeg" alt="AI Portfolio"></div>
    <div class="card" data-category="photo"><img src="photo5.jpg" alt="AI Portfolio"></div>
    <div class="card" data-category="vector"><img src="photo6.jpg" alt="AI Portfolio"></div>
    <div class="card" data-category="vector"><img src="photo7.jpg" alt="AI Portfolio"></div>
    <div class="card" data-category="photo"><img src="photo8.jpg" alt="AI Portfolio"></div>
    <div class="card" data-category="vector"><img src="photo9.jpg" alt="AI Portfolio"></div>
    <div class="card" data-category="vector"><img src="photo10.jpg" alt="AI Portfolio"></div>
</div>

</section>

<!-- পপআপ উইন্ডো -->
<div class="popup-overlay" id="popupOverlay">
<span class="close-btn" id="closeBtn">&times;</span>
<img class="popup-img" id="popupImg" src="" alt="Popup View">
</div>

<footer>
© 2026 2 Stock
</footer>

<!-- জাভাস্ক্রিপ্ট (পপআপ এবং ফিল্টারিং উভয়ের জন্য) -->
<script>
// --- ইমেজ পপআপ কোড ---
const cards = document.querySelectorAll('.card img');
const overlay = document.getElementById('popupOverlay');
const popupImg = document.getElementById('popupImg');
const closeBtn = document.getElementById('closeBtn');

cards.forEach(img => {
    img.addEventListener('click', () => {
        popupImg.src = img.src;
        overlay.classList.add('active');
    });
});

closeBtn.addEventListener('click', () => {
    overlay.classList.remove('active');
});

overlay.addEventListener('click', (e) => {
    if (e.target === overlay) {
        overlay.classList.remove('active');
    }
});

// --- ক্যাটাগরি ফিল্টার কোড ---
const filterButtons = document.querySelectorAll('.filter-btn');
const filterableCards = document.querySelectorAll('.grid .card');

filterButtons.forEach(button => {
    button.addEventListener('click', () => {
        // একটিভ ক্লাস চেইঞ্জ করার জন্য
        document.querySelector('.filter-btn.active').classList.remove('active');
        button.classList.add('active');

        let filterName = button.getAttribute('data-name');

        filterableCards.forEach(card => {
            let cardCategory = card.getAttribute('data-category');
            
            // ফিল্টার লজিক
            if(filterName === 'all' || filterName === cardCategory) {
                card.classList.remove('hide');
            } else {
                card.classList.add('hide');
            }
        });
    });
});
</script>

</body>
</html>
