<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI Photo & Vector Gallery</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            padding: 40px 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            color: #38bdf8;
        }
        /* Grid Gallery Setup */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Professional Hover Card Effect */
        .card {
            background-color: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(56, 189, 248, 0.2);
        }
        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }
        .card:hover img {
            transform: scale(1.05);
        }

        /* Image Popup (Lightbox) Styling */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }
        .popup-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .popup-img {
            max-width: 90%;
            max-height: 80%;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }
        .popup-overlay.active .popup-img {
            transform: scale(1);
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: #fff;
            cursor: pointer;
            transition: color 0.2s;
        }
        .close-btn:hover {
            color: #38bdf8;
        }
    </style>
</head>
<body>

    <h1>My AI Portfolio</h1>

    <!-- Gallery Section -->
    <div class="gallery-container">
        <div class="card"><img src="photo1.png" alt="AI Artwork"></div>
        <div class="card"><img src="photo2.jpg" alt="AI Artwork"></div>
        <div class="card"><img src="photo3.jpg" alt="AI Artwork"></div>
        <div class="card"><img src="photo4.jpeg" alt="AI Artwork"></div>
        <div class="card"><img src="photo5.jpg" alt="AI Artwork"></div>
        <div class="card"><img src="photo6.jpg" alt="AI Artwork"></div>
        <div class="card"><img src="photo7.jpg" alt="AI Artwork"></div>
        <div class="card"><img src="photo8.jpg" alt="AI Artwork"></div>
        <div class="card"><img src="photo9.jpg" alt="AI Artwork"></div>
        <div class="card"><img src="photo10.jpg" alt="AI Artwork"></div>
    </div>

    <!-- Popup Window Overlay -->
    <div class="popup-overlay" id="popupOverlay">
        <span class="close-btn" id="closeBtn">&times;</span>
        <img class="popup-img" id="popupImg" src="" alt="Popup View">
    </div>

    <!-- Javascript for Popup/Zoom Feature -->
    <script>
        const cards = document.querySelectorAll('.card img');
        const overlay = document.getElementById('popupOverlay');
        const popupImg = document.getElementById('popupImg');
        const closeBtn = document.getElementById('closeBtn');

        // ওপেন করার জন্য ক্লিক ইভেন্ট
        cards.forEach(img => {
            img.addEventListener('click', () => {
                popupImg.src = img.src;
                overlay.classList.add('active');
            });
        });

        // বন্ধ করার জন্য ক্লিক ইভেন্ট
        closeBtn.addEventListener('click', () => {
            overlay.classList.remove('active');
        });

        // বাইরের কালো অংশে ক্লিক করলেও বন্ধ হবে
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                overlay.classList.remove('active');
            }
        });
    </script>

</body>
</html>
