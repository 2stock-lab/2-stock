<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2 Stock</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

.bg{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
background:
radial-gradient(circle at 20% 20%, rgba(0,255,255,.15), transparent 30%),
radial-gradient(circle at 80% 80%, rgba(140,0,255,.15), transparent 30%);
}

nav{
display:flex;
justify-content:space-between;
padding:20px 8%;
backdrop-filter:blur(20px);
background:rgba(255,255,255,.05);
border-bottom:1px solid rgba(255,255,255,.1);
}

.logo{
font-size:28px;
font-weight:bold;
}

.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.glass{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.12);
backdrop-filter:blur(20px);
padding:50px;
border-radius:25px;
max-width:800px;
}

h1{
font-size:60px;
margin-bottom:10px;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 30px;
border-radius:50px;
text-decoration:none;
color:white;
background:linear-gradient(90deg,#00e5ff,#8b5cf6);
}

.gallery{
padding:80px 8%;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
height:250px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(15px);
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
}

footer{
text-align:center;
padding:30px;
border-top:1px solid rgba(255,255,255,.1);
}
</style>
</head>

<body>

<div class="bg"></div>

<nav>
<div class="logo">
<img src="logo.png" alt="2 Stock Logo" height="60">
</div>
</nav>

<section class="hero">
<div class="glass">
<h1>2 Stock</h1>
<p>Premium AI Photos & Vectors</p>
<a href="#" class="btn">Explore</a>
</div>
</section>

<section class="gallery">
<h2 style="text-align:center;margin-bottom:30px;">Featured Collection</h2>

<div class="grid">
<div class="card">
<img src="photo1.png" style="width:100%;height:100%;object-fit:cover;border-radius:20px;">
</div>

<div class="card">
<img src="photo2.jpg" style="width:100%;height:100%;object-fit:cover;border-radius:20px;">
</div>

<div class="card">
<img src="photo3.jpg" style="width:100%;height:100%;object-fit:cover;border-radius:20px;">
</div>
<div class="card">Vector 2</div>
</div>

</section>

<footer>
© 2026 2 Stock
</footer>

</body>
</html>
